name: Build Container Images

on:
  push:
    branches: [main]
    paths:
      - 'controller/**'
      - 'runner/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which image to build'
        required: false
        default: 'both'
        type: choice
        options: [both, controller, runner]

permissions:
  id-token: write
  contents: read

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/benchmarking

jobs:
  build-controller:
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'both' ||
      github.event.inputs.target == 'controller'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push controller
        uses: docker/build-push-action@v6
        with:
          context: controller/
          push: true
          tags: |
            ${{ env.REGISTRY }}/controller:${{ github.sha }}
            ${{ env.REGISTRY }}/controller:latest
          cache-from: type=gha,scope=controller
          cache-to: type=gha,mode=max,scope=controller

      - name: Restart controller
        run: |
          gcloud container clusters get-credentials benchmark-cluster --region ${{ env.REGION }}
          kubectl rollout restart statefulset/benchmark-controller -n benchmarking

  build-runner:
    if: >
      github.event_name == 'push' ||
      github.event.inputs.target == 'both' ||
      github.event.inputs.target == 'runner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push runner
        uses: docker/build-push-action@v6
        with:
          context: runner/
          push: true
          tags: |
            ${{ env.REGISTRY }}/runner:${{ github.sha }}
            ${{ env.REGISTRY }}/runner:latest
          cache-from: type=gha,scope=runner
          cache-to: type=gha,mode=max,scope=runner
